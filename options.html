<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Click Translate Dot Settings</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        padding: 24px;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        background: #f7f7f8;
        color: #111827;
      }

      .panel {
        max-width: 720px;
        padding: 24px;
        margin: 0 auto;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
        font-size: 24px;
      }

      .hero {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-bottom: 18px;
      }

      .hero img {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        box-shadow: 0 10px 24px rgba(255, 59, 48, 0.18);
        background: #fff4f3;
      }

      p {
        color: #4b5563;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      label {
        font-weight: 600;
      }

      select,
      input,
      button {
        height: 40px;
        font: inherit;
      }

      select,
      input {
        padding: 0 12px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
      }

      button {
        margin-top: 20px;
        border: 0;
        border-radius: 10px;
        background: #111827;
        color: #ffffff;
        cursor: pointer;
        padding: 0 16px;
      }

      .status {
        min-height: 24px;
        margin-top: 12px;
        color: #065f46;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="hero">
        <img src="assets/translate-badge.svg" alt="Translate extension icon">
        <div>
          <h1>Click Translate Dot</h1>
          <p>当前版本已经接入 DeepSeek API，默认英译中。你可以在这里启用扩展、切换模型，或手动覆盖 API Key。</p>
        </div>
      </div>

      <div class="field">
        <label>
          <input id="enabled" type="checkbox">
          启用扩展
        </label>
      </div>

      <div class="field">
        <label for="sourceLang">源语言</label>
        <select id="sourceLang">
          <option value="en">English</option>
        </select>
      </div>

      <div class="field">
        <label for="targetLang">目标语言</label>
        <select id="targetLang">
          <option value="zh-CN">简体中文</option>
        </select>
      </div>

      <div class="field">
        <label for="provider">翻译服务</label>
        <select id="provider">
          <option value="deepseek">DeepSeek</option>
        </select>
      </div>

      <div class="field">
        <label for="model">模型</label>
        <select id="model">
          <option value="deepseek-v4-flash">deepseek-v4-flash</option>
          <option value="deepseek-v4-pro">deepseek-v4-pro</option>
        </select>
      </div>

      <div class="field">
        <label for="apiKey">DeepSeek API Key（可选覆盖）</label>
        <input id="apiKey" type="password" placeholder="留空时使用 src/local-config.js 中的本地配置">
      </div>

      <button id="saveButton" type="button">保存设置</button>
      <div class="status" id="status"></div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
